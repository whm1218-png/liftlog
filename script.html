<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftLog — 발표 대본</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0d14;--card:#1a1a26;--accent:#7c5cfc;--accent2:#fc5c7d;--green:#22d3a5;--text:#f0f0f8;--muted:#7b7b9a;--border:rgba(124,92,252,0.2);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:24px 20px 80px;}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border);}
  .header-title{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);letter-spacing:.2em;text-transform:uppercase;}
  .timer-box{display:flex;align-items:center;gap:12px;}
  .timer-display{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--text);letter-spacing:.05em;min-width:80px;text-align:center;}
  .timer-display.warn{color:var(--accent2);}
  .btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;}
  .btn:hover{color:var(--accent);border-color:var(--accent);}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  .btn.primary:hover{opacity:.85;}

  /* PROGRESS BAR */
  .progress-wrap{margin-bottom:28px;}
  .progress-bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s ease;}
  .progress-labels{display:flex;justify-content:space-between;margin-top:8px;}
  .progress-label{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);}

  /* SLIDE TABS */
  .tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
  .tab{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .2s;}
  .tab:hover{color:var(--text);border-color:var(--muted);}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* SCRIPT CARD */
  .script-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:16px;}
  .script-card.active-card{border-color:var(--accent);box-shadow:0 0 20px rgba(124,92,252,.15);}
  .card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
  .slide-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .slide-num.done{background:rgba(34,211,165,.2);color:var(--green);}
  .slide-name{font-size:15px;font-weight:700;}
  .slide-time{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);background:rgba(124,92,252,.12);padding:3px 10px;border-radius:10px;flex-shrink:0;}
  .script-text{font-size:17px;line-height:2;color:#d8d8f0;}
  .script-text strong{color:#fff;font-weight:600;}
  .script-text .cue{display:inline-block;background:rgba(252,92,125,.12);color:var(--accent2);font-size:13px;font-family:'JetBrains Mono',monospace;padding:1px 8px;border-radius:6px;margin:0 3px;}
  .tip{margin-top:14px;padding:10px 14px;background:rgba(34,211,165,.07);border-left:3px solid var(--green);border-radius:0 8px 8px 0;font-size:13px;color:var(--muted);line-height:1.7;}
  .tip strong{color:var(--green);}

  /* CURRENT INDICATOR */
  .current-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent);background:rgba(124,92,252,.12);padding:2px 10px;border-radius:10px;margin-left:8px;}
  .pulse{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}

  /* STICKY CURRENT */
  .sticky-now{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:10px 24px;border-radius:30px;font-size:14px;font-family:'JetBrains Mono',monospace;box-shadow:0 4px 24px rgba(124,92,252,.4);display:flex;align-items:center;gap:10px;cursor:pointer;z-index:100;transition:all .2s;}
  .sticky-now:hover{opacity:.9;}

  /* SEPARATOR */
  .sep{height:1px;background:var(--border);margin:8px 0 16px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🎤 LiftLog 발표 대본</div>
  <div class="timer-box">
    <div class="timer-display" id="timer">7:00</div>
    <button class="btn primary" id="start-btn" onclick="startTimer()">▶ 시작</button>
    <button class="btn" onclick="resetTimer()">↺ 리셋</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="prog-fill" style="width:100%"></div>
  </div>
  <div class="progress-labels">
    <span class="progress-label" id="prog-label">대기 중</span>
    <span class="progress-label">총 7:00</span>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div id="scripts"></div>

<div class="sticky-now" id="sticky-btn" onclick="scrollToCurrent()">
  <div class="pulse"></div>
  현재 슬라이드로 이동
</div>

<script>
const SLIDES = [
  {
    name:"타이틀",
    time:"0:00 – 0:30",
    text:`안녕하세요. <strong>LiftLog</strong> 프로젝트를 발표할 [이름]입니다.<br><br>
LiftLog는 <strong>점진적 과부하 기록과 1RM 자동 계산</strong>이 통합된 헬스 전용 모바일 앱입니다.<br>
Flutter로 개발하고 SQLite와 Firebase를 함께 사용합니다.<br><br>
바로 문제 정의로 넘어가겠습니다. <span class="cue">→ 슬라이드 2</span>`,
    tip:`<strong>팁:</strong> 이름 뒤에 잠깐 멈추고 청중과 눈 맞추기. 너무 빠르게 넘어가지 말 것.`
  },
  {
    name:"비전 · 문제",
    time:"0:30 – 1:00",
    text:`헬스장을 다니는 분들 중에 <strong>운동 기록을 꾸준히 남기는 분은 극소수</strong>입니다.<br><br>
대부분은 "저번에 몇 kg 들었더라?"를 기억에만 의존합니다.<br>
기록이 없으니 무게를 올려야 할 타이밍을 놓치고 <strong>정체기를 반복</strong>합니다.<br><br>
LiftLog는 이 문제를 해결합니다.<br>
세트 기록을 <strong>4탭 이내</strong>로 끝내고, 1RM을 자동 계산해서<br>
내 성장을 <strong>숫자로 증명</strong>합니다.<br>
인터넷이 없어도 <strong>100% 동작</strong>합니다. <span class="cue">→ 슬라이드 3</span>`,
    tip:`<strong>팁:</strong> "저번에 몇 kg 들었더라?" 부분에서 살짝 웃으며 공감 유도. 청중이 헬스인이라면 바로 고개를 끄덕임.`
  },
  {
    name:"사용자 시나리오",
    time:"1:00 – 2:00",
    text:`실제 사용 흐름을 한 가지 시나리오로 보여드리겠습니다.<br><br>
헬스장에 도착한 김민준씨가 앱을 켜고 벤치프레스를 선택합니다.<br>
<strong>80kg, 8회를 입력하고 기록 버튼을 누르면 — 탭 4번</strong>으로 끝납니다.<br><br>
그 순간 <strong>Epley 공식으로 1RM이 93.3kg으로 자동 계산</strong>되어 표시됩니다.<br>
휴식 타이머가 자동으로 시작되고, 운동이 끝나면 진행 차트에서<br>
"이번 달 +2.5kg" 뱃지를 확인하며 <strong>동기 부여</strong>를 받습니다. <span class="cue">→ 슬라이드 4</span>`,
    tip:`<strong>팁:</strong> 손가락으로 탭 4번을 실제로 짚어가며 설명하면 임팩트 있음. "93.3"은 정확히 말할 것.`
  },
  {
    name:"아키텍처",
    time:"2:00 – 3:00",
    text:`아키텍처는 <strong>4레이어 MVVM 구조</strong>입니다.<br><br>
왼쪽부터 — 화면을 담당하는 <strong>Presentation</strong>,<br>
상태와 흐름을 관리하는 <strong>Application ViewModel</strong>,<br>
Epley 공식이 들어있는 <strong>Domain</strong> — 이 레이어는 순수 Dart라 Flutter 없이도 테스트 가능합니다,<br>
SQLite와 Firebase를 담당하는 <strong>Data 레이어</strong>입니다.<br><br>
실제 흐름은 — 기록 화면에서 입력하면, ViewModel이 Epley 공식으로 1RM을 계산하고,<br>SQLite에 저장한 뒤 Firebase에 <strong>백그라운드로 자동 백업</strong>됩니다. <span class="cue">→ 슬라이드 5</span>`,
    tip:`<strong>팁:</strong> 화살표를 손으로 따라가며 설명. "순수 Dart" 강조 — 테스트 가능성 어필 포인트.`
  },
  {
    name:"기술 스택",
    time:"3:00 – 3:30",
    text:`기술 스택 선택은 모두 <strong>ADR 문서로 결정 근거를 기록</strong>했습니다.<br><br>
<strong>Flutter</strong> — 단일 코드로 iOS와 Android를 동시에 지원합니다.<br>
<strong>SQLite</strong> — 관계형 집계 쿼리와 마이그레이션이 강력합니다.<br>
<strong>Firebase</strong> — Auth로 로그인을, Firestore로 클라우드 백업을 동시에 해결합니다.<br>
<strong>Epley 공식</strong> — 커뮤니티 표준 1RM 추정 공식입니다.<br><br>
MVP는 MoSCoW 기준으로 <strong>5개 Must Have</strong>에만 집중합니다. <span class="cue">→ 슬라이드 6</span>`,
    tip:`<strong>팁:</strong> "ADR 문서로 기록했습니다" — 이 부분이 가산점 포인트. 자신 있게 강조.`
  },
  {
    name:"WBS · 진행",
    time:"3:30 – 4:30",
    text:`전체 일정은 6주입니다.<br><br>
<strong>10주차 기획 문서 — 완료.</strong> 비전, 요구사항, WBS, ADR 3개, 위험 분석 작성 완료.<br>
<strong>11주차 환경 구축 — 완료.</strong> Flutter 초기화, Firebase 연결, docs/setup.md, docs/architecture.md 완료.<br>
<strong>현재 12주차 — 핵심 기능 구현 중.</strong> 세트 기록, 1RM 계산, 차트 화면 작업 중입니다.<br><br>
13주차에 기능 완성과 테스트, 14주차에 배포와 문서를 마무리하고<br>
15주차 최종 발표로 마무리할 계획입니다. <span class="cue">→ 슬라이드 7</span>`,
    tip:`<strong>팁:</strong> 빛나는(current) 행을 손으로 가리키며 "지금 여기입니다"라고 하면 명확함.`
  },
  {
    name:"데모",
    time:"4:30 – 5:30",
    text:`데모 시연을 진행하겠습니다.<br><br>
<strong>첫 번째</strong> — 세트 기록 흐름. 벤치프레스 80kg 8회를 입력하면 1RM 93.3kg이 자동 표시됩니다.<br>
<strong>두 번째</strong> — 휴식 타이머. 세트 완료 후 자동 90초 타이머 시작, 완료 시 알림이 옵니다.<br>
<strong>세 번째</strong> — 진행 차트. 4주간 스쿼트 1RM 추이와 지난 달 대비 증가량을 확인합니다.<br><br>
혹시 기술적 문제가 생기면 <strong>미리 녹화한 30초 백업 영상</strong>으로 전환하겠습니다. <span class="cue">→ 슬라이드 8</span>`,
    tip:`<strong>⚠️ 데모 전 반드시:</strong> 앱 미리 켜두기 / 알림 끄기 / 밝기 최대 / 백업 영상 준비`
  },
  {
    name:"남은 일정",
    time:"5:30 – 6:30",
    text:`남은 3주 일정입니다.<br><br>
<strong>13주차</strong> — 기능 완성과 테스트. 휴식 타이머, Firebase 백업을 완성하고 단위·통합 테스트를 작성합니다.<br><br>
<strong>14주차</strong> — Firebase App Distribution으로 배포하고 deploy, testing 문서를 완성합니다.<br><br>
<strong>15주차</strong> — 최종 발표. 리허설 3회 진행하고 BONUS 가산점도 어필할 예정입니다.<br><br>
현재 가장 큰 과제는 <strong>Firebase 증분 동기화 로직</strong>입니다. 이번 주 안에 해결할 계획입니다. <span class="cue">→ 슬라이드 9</span>`,
    tip:`<strong>팁:</strong> 어려운 점을 솔직하게 말하는 게 오히려 +점수. "해결할 계획"까지 붙이면 완벽.`
  },
  {
    name:"AI 활용 · Q&A",
    time:"6:30 – 7:00",
    text:`마지막으로 AI 활용 현황을 솔직하게 말씀드리겠습니다.<br><br>
<strong>Claude</strong> — 기획 문서 8개, ADR 3개, 위험 분석, 발표 자료를 생성했습니다.<br>
<strong>Cursor AI</strong> — Flutter 코드 구현, 폴더 구조, 컴포넌트 초안을 만들었습니다.<br>
<strong>제가 직접 한 부분</strong> — ADR 결정 근거 검토·수정, 1RM 공식 한계 검증, 아키텍처 최종 결정입니다.<br><br>
AI가 생성한 코드도 반드시 직접 읽고 이해한 후 사용했습니다.<br><br>
이상입니다. <strong>질문 받겠습니다.</strong>`,
    tip:`<strong>팁:</strong> "직접 한 부분"을 자신 있게 말할 것. 숨기지 않는 게 이 수업의 평가 기준.`
  }
];

// 7분 or 2분 선택
const urlParams = new URLSearchParams(window.location.search);
const is2min = urlParams.get('mode') === '2min';
const TOTAL_SECS = is2min ? 120 : 420;
const TOTAL_LABEL = is2min ? '2:00' : '7:00';

// 2분 모드면 슬라이드 5개만
const ACTIVE_SLIDES = is2min
  ? [SLIDES[0], SLIDES[1], SLIDES[5], SLIDES[3], SLIDES[4]]
  : SLIDES;

if(is2min){
  document.querySelector('.header-title').textContent = '🎤 LiftLog 발표 대본 (2분)';
}

let current = 0;
let remaining = TOTAL_SECS;
let started = false;
let timerInterval;

const timerEl = document.getElementById('timer');
const progFill = document.getElementById('prog-fill');
const progLabel = document.getElementById('prog-label');
const startBtn = document.getElementById('start-btn');

function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}

function startTimer(){
  if(started) return;
  started = true;
  startBtn.textContent = '⏸ 진행중';
  startBtn.classList.remove('primary');
  progLabel.textContent = '발표 진행 중';
  timerInterval = setInterval(()=>{
    remaining--;
    const ratio = remaining / TOTAL_SECS;
    timerEl.textContent = fmt(remaining);
    progFill.style.width = (ratio * 100) + '%';
    if(remaining <= 60){ timerEl.classList.add('warn'); progFill.style.background='linear-gradient(90deg,#fc5c7d,#f5a623)'; }
    if(remaining <= 0){ clearInterval(timerInterval); timerEl.textContent='종료'; progLabel.textContent='발표 종료'; }
  }, 1000);
}

function resetTimer(){
  clearInterval(timerInterval);
  remaining = TOTAL_SECS; started = false;
  timerEl.textContent = TOTAL_LABEL;
  timerEl.classList.remove('warn');
  progFill.style.width = '100%';
  progFill.style.background = 'linear-gradient(90deg,#7c5cfc,#fc5c7d)';
  progLabel.textContent = '대기 중';
  startBtn.textContent = '▶ 시작';
  startBtn.classList.add('primary');
}

timerEl.textContent = TOTAL_LABEL;

// BUILD UI
const tabsEl = document.getElementById('tabs');
const scriptsEl = document.getElementById('scripts');

ACTIVE_SLIDES.forEach((s, i) => {
  // tab
  const tab = document.createElement('button');
  tab.className = 'tab' + (i===0?' active':'');
  tab.textContent = (i+1)+'. '+s.name;
  tab.onclick = () => setActive(i);
  tabsEl.appendChild(tab);

  // card
  const card = document.createElement('div');
  card.className = 'script-card' + (i===0?' active-card':'');
  card.id = 'card-'+i;
  card.innerHTML = `
    <div class="card-header">
      <div class="slide-num" id="num-${i}">${i+1}</div>
      <div class="slide-name">${s.name}${i===0?'<span class="current-badge"><div class="pulse"></div>현재</span>':''}</div>
      <div class="slide-time">${s.time}</div>
    </div>
    <div class="script-text">${s.text}</div>
    ${s.tip ? `<div class="tip">${s.tip}</div>` : ''}
  `;
  scriptsEl.appendChild(card);

  if(i < ACTIVE_SLIDES.length-1){
    const sep = document.createElement('div');
    sep.className = 'sep';
    scriptsEl.appendChild(sep);
  }
});

function setActive(n){
  // tabs
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  // cards
  document.querySelectorAll('.script-card').forEach((c,i)=>{
    c.classList.toggle('active-card',i===n);
    const numEl = document.getElementById('num-'+i);
    // update header badge
    const nameEl = c.querySelector('.slide-name');
    const badgeEl = nameEl.querySelector('.current-badge');
    if(i===n){
      numEl.classList.remove('done');
      if(!badgeEl){ nameEl.insertAdjacentHTML('beforeend','<span class="current-badge"><div class="pulse"></div>현재</span>'); }
    } else {
      if(badgeEl) badgeEl.remove();
      if(i<n) numEl.classList.add('done');
    }
  });
  current = n;
}

function scrollToCurrent(){
  const card = document.getElementById('card-'+current);
  if(card) card.scrollIntoView({behavior:'smooth', block:'center'});
}

// keyboard nav
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();if(current<ACTIVE_SLIDES.length-1)setActive(current+1);}
  if(e.key==='ArrowLeft'){e.preventDefault();if(current>0)setActive(current-1);}
  if(e.key==='Enter'&&!started) startTimer();
});
</script>
</body>
</html>
